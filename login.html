<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول — OMAR BRO HOST</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #040812;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow-x: hidden;
        }
        /* خلفية النجوم */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .login-container {
            position: relative;
            z-index: 1;
        }
        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .login-card {
            background: rgba(15, 25, 45, 0.95);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 50px 30px;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-img {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .logo-name {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #8899aa;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }
        .error-msg {
            display: none;
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid #ff4444;
            color: #ff6666;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .features-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid rgba(0, 212, 255, 0.2);
        }
        .features-title {
            text-align: center;
            color: #00d4ff;
            font-weight: 800;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .feature-item {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
        }
        .feature-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .stats-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }
        .stat-item {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 900;
            color: #00ff88;
            display: block;
        }
        .stat-label {
            color: #8899aa;
            font-size: 11px;
            margin-top: 5px;
        }
        .footer-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid rgba(0, 212, 255, 0.2);
            text-align: center;
        }
        .social-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #00d4ff;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .social-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }
        .ai-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 35px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }
        .ai-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.6);
        }
        .ai-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .ai-modal.active {
            display: flex;
        }
        .ai-box {
            background: rgba(15, 25, 45, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
        }
        .ai-header {
            padding: 20px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ai-title {
            font-weight: 800;
            color: #00d4ff;
            font-size: 16px;
        }
        .ai-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .ai-message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            max-width: 80%;
        }
        .ai-message.user {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            align-self: flex-end;
        }
        .ai-message.bot {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            align-self: flex-start;
        }
        .ai-input-row {
            padding: 15px;
            border-top: 2px solid rgba(0, 212, 255, 0.2);
            display: flex;
            gap: 10px;
        }
        .ai-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            padding: 10px 12px;
            font-size: 13px;
            outline: none;
        }
        .ai-send {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .ai-send:hover {
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .login-card { padding: 30px 20px; }
            .features-grid { grid-template-columns: 1fr; }
            .stats-section { grid-template-columns: 1fr 1fr; }
            .ai-button { width: 60px; height: 60px; font-size: 28px; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="stars-canvas"></canvas>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-img">🖥️</div>
                <div class="logo-name">OMAR BRO HOST</div>
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
                <button type="submit" class="btn-login">دخول</button>
            </form>

            <div class="features-section">
                <div class="features-title">✨ الميزات الرئيسية</div>
                <div class="features-grid">
                    <div class="feature-item">
                        <div class="feature-icon">🚀</div>
                        <div>استضافة فورية</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🔐</div>
                        <div>آمنة وموثوقة</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">⚡</div>
                        <div>سرعة عالية</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">📊</div>
                        <div>إحصائيات مباشرة</div>
                    </div>
                </div>

                <div class="features-title">📈 الإحصائيات</div>
                <div class="stats-section">
                    <div class="stat-item">
                        <span class="stat-value">1000+</span>
                        <span class="stat-label">مستخدم نشط</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">99.9%</span>
                        <span class="stat-label">توفر الخدمة</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">24/7</span>
                        <span class="stat-label">دعم فني</span>
                    </div>
                </div>
            </div>

            <div class="footer-section">
                <div class="social-btns">
                    <a href="https://t.me/RLH55" target="_blank" class="social-btn">👨‍💻 المطور @RLH55</a>
                    <a href="https://t.me/RLH5500" target="_blank" class="social-btn">📢 القناة @RLH5500</a>
                </div>
            </div>
        </div>
    </div>

    <button class="ai-button" onclick="toggleAI()">🤖</button>

    <div class="ai-modal" id="aiModal">
        <div class="ai-box">
            <div class="ai-header">
                <span class="ai-title">✨ مساعد الذكاء الاصطناعي</span>
                <button class="ai-close" onclick="toggleAI()">✕</button>
            </div>
            <div class="ai-messages" id="aiMessages">
                <div class="ai-message bot">مرحباً! 👋 أنا مساعد OMAR BRO HOST. كيف يمكنني مساعدتك اليوم؟</div>
            </div>
            <div class="ai-input-row">
                <input type="text" class="ai-input" id="aiInput" placeholder="اكتب سؤالك هنا...">
                <button class="ai-send" onclick="sendAIMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = '❌ ' + data.message;
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ خطأ في الاتصال';
            }
        };

        function toggleAI() {
            document.getElementById('aiModal').classList.toggle('active');
        }

        function sendAIMessage() {
            const input = document.getElementById('aiInput');
            const msg = input.value.trim();
            if (!msg) return;

            const messagesBox = document.getElementById('aiMessages');
            const userMsg = document.createElement('div');
            userMsg.className = 'ai-message user';
            userMsg.textContent = msg;
            messagesBox.appendChild(userMsg);
            input.value = '';
            messagesBox.scrollTop = messagesBox.scrollHeight;

            setTimeout(() => {
                const botMsg = document.createElement('div');
                botMsg.className = 'ai-message bot';
                botMsg.textContent = '🤖 شكراً على سؤالك! سيقوم فريق الدعم بالرد عليك قريباً.';
                messagesBox.appendChild(botMsg);
                messagesBox.scrollTop = messagesBox.scrollHeight;
            }, 500);
        }

        document.getElementById('aiInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendAIMessage();
        };

        // خلفية النجوم المتحركة
        (function() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            let stars = [];
            const NUM_STARS = 220;
            const SPEED = 0.25;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function initStars() {
                stars = [];
                for (let i = 0; i < NUM_STARS; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        r: Math.random() * 1.6 + 0.2,
                        alpha: Math.random() * 0.8 + 0.2,
                        speed: Math.random() * SPEED + 0.04,
                        twinkle: Math.random() * Math.PI * 2
                    });
                }
            }

            function drawStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // خلفية تدرجية سماوية
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#020610');
                grad.addColorStop(0.4, '#060e1e');
                grad.addColorStop(1, '#0a1428');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                stars.forEach(s => {
                    s.twinkle += 0.018;
                    const alpha = s.alpha * (0.5 + 0.5 * Math.sin(s.twinkle));
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(180, 220, 255, ${alpha})`;
                    ctx.fill();
                    s.y += s.speed;
                    if (s.y > canvas.height) {
                        s.y = 0;
                        s.x = Math.random() * canvas.width;
                    }
                });
            }

            function animate() {
                drawStars();
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => { resize(); initStars(); });
            resize();
            initStars();
            animate();
        })();
    </script>
</body>
</html>
