<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMAR BRO HOST — تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00d4ff;
      --primary-dark: #0099cc;
      --primary-light: #6aefff;
      --gold: #FFD700;
      --gold-dark: #FFA500;
      --gradient: linear-gradient(135deg, #00d4ff 0%, #0066ff 50%, #00d4ff 100%);
      --gold-gradient: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
      --bg: #05060a;
      --bg-card: rgba(5, 10, 22, 0.97);
      --text: #ffffff;
      --text-muted: #8899aa;
      --success: #00ff88;
      --error: #ff4444;
      --border: rgba(0, 212, 255, 0.25);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    #bgCanvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .stars-layer {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none; overflow: hidden;
    }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: white; border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite; opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: var(--op); transform: scale(1.2); }
    }
    .login-wrapper {
      position: relative; z-index: 10;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
    }
    .login-box {
      width: 100%; max-width: 620px;
      animation: boxAppear 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      padding: 0 15px;
    }
    @keyframes boxAppear {
      from { opacity: 0; transform: translateY(60px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .brand { text-align: center; margin-bottom: 35px; }
    .brand-icon {
      width: 100px; height: 100px; margin: 0 auto 18px;
      background: var(--gradient); border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      box-shadow: 0 0 50px rgba(0,212,255,0.6), 0 0 100px rgba(0,100,255,0.3);
      animation: iconPulse 3s ease-in-out infinite; position: relative;
      overflow: hidden;
    }
    .brand-icon::after {
      content: ''; position: absolute; inset: -3px; border-radius: 27px;
      background: var(--gradient); z-index: -1; opacity: 0.4;
      filter: blur(8px); animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { box-shadow: 0 0 30px rgba(0,212,255,0.4), 0 0 60px rgba(0,100,255,0.15); }
      50%      { box-shadow: 0 0 50px rgba(0,212,255,0.7), 0 0 100px rgba(0,100,255,0.3); }
    }
    .brand-name {
      font-size: 2.4rem; font-weight: 900;
      background: var(--gradient); background-size: 200% 200%;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      letter-spacing: 3px; text-transform: uppercase; line-height: 1; margin-bottom: 8px;
      animation: gradientShift 4s ease infinite;
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    .brand-tagline { color: var(--text-muted); font-size: 0.95rem; letter-spacing: 1px; }
    .card {
      background: var(--bg-card); border-radius: 24px; padding: 45px 40px;
      border: 1px solid var(--border);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,212,255,0.05),
                  inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative; overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--gradient); background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
    }
    .form-heading {
      text-align: center; font-size: 1.55rem; font-weight: 800; color: var(--text);
      margin-bottom: 32px; letter-spacing: 1px; position: relative; padding-bottom: 16px;
    }
    .form-heading::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 60px; height: 3px; background: var(--gradient); border-radius: 2px;
    }
    .field { margin-bottom: 22px; position: relative; }
    .field label {
      display: block; margin-bottom: 9px; color: var(--text-muted);
      font-size: 0.9rem; font-weight: 600; letter-spacing: 0.5px; transition: color 0.3s;
    }
    .field:focus-within label { color: var(--primary); }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      font-size: 18px; pointer-events: none; transition: all 0.3s; z-index: 2;
    }
    .field input {
      width: 100%; padding: 15px 50px 15px 50px;
      background: rgba(0,0,0,0.5); border: 2px solid rgba(0,212,255,0.2);
      border-radius: 14px; color: var(--text); font-size: 1rem;
      font-family: 'Tajawal', sans-serif; font-weight: 500; transition: all 0.3s; outline: none;
    }
    .field input:focus {
      border-color: var(--primary); background: rgba(0,212,255,0.06);
      box-shadow: 0 0 0 4px rgba(0,212,255,0.1), 0 0 20px rgba(0,212,255,0.15);
    }
    .toggle-pass {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 18px;
      color: var(--text-muted); padding: 4px; transition: color 0.3s; z-index: 2;
    }
    .toggle-pass:hover { color: var(--primary); }
    .remember-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 26px; cursor: pointer; user-select: none;
    }
    .remember-row input[type="checkbox"] { display: none; }
    .custom-check {
      width: 22px; height: 22px; border: 2px solid rgba(0,212,255,0.4);
      border-radius: 7px; background: rgba(0,0,0,0.4); position: relative;
      transition: all 0.3s; flex-shrink: 0;
    }
    .remember-row input:checked + .custom-check {
      background: var(--primary); border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0,212,255,0.5);
    }
    .remember-row input:checked + .custom-check::after {
      content: '✓'; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); color: #000; font-size: 13px; font-weight: 900;
    }
    .remember-label { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
    .btn-login {
      width: 100%; padding: 17px; background: var(--gradient); background-size: 200% 200%;
      border: none; border-radius: 14px; color: #000; font-size: 1.1rem; font-weight: 900;
      cursor: pointer; font-family: 'Tajawal', sans-serif; letter-spacing: 1px;
      text-transform: uppercase; position: relative; overflow: hidden; transition: all 0.3s;
      animation: gradientShift 4s ease infinite;
    }
    .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,136,255,0.5); }
    .btn-login:active { transform: translateY(-1px); }
    .btn-login::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: 0.5s;
    }
    .btn-login:hover::before { left: 100%; }
    .btn-login .btn-text { transition: opacity 0.3s; }
    .btn-login .btn-spinner {
      display: none; width: 22px; height: 22px;
      border: 3px solid rgba(0,0,0,0.3); border-top-color: #000;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .btn-spinner { display: block; }
    .alert {
      margin-top: 18px; padding: 14px 18px; border-radius: 12px;
      font-size: 0.95rem; font-weight: 600; text-align: center; display: none;
      animation: alertIn 0.4s ease;
    }
    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert.success { background: rgba(0,255,136,0.1); border: 2px solid rgba(0,255,136,0.3); color: var(--success); }
    .alert.error   { background: rgba(255,68,68,0.1);  border: 2px solid rgba(255,68,68,0.3);  color: var(--error); }
    .admin-hint {
      margin-top: 20px; padding: 14px; border-radius: 12px;
      background: rgba(255,215,0,0.06); border: 1px solid rgba(255,215,0,0.2);
      text-align: center; display: none;
    }
    .admin-hint p { color: var(--gold); font-size: 0.85rem; font-weight: 600; }
    .divider {
      display: flex; align-items: center; gap: 12px; margin: 22px 0;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,212,255,0.15); }
    .divider span { color: var(--text-muted); font-size: 0.8rem; }
    .footer-info { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.82rem; }
    .footer-info span { color: var(--primary); font-weight: 700; }
    @media (max-width: 520px) { .card { padding: 28px 20px; } .brand-name { font-size: 1.9rem; } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="stars-layer" id="starsLayer"></div>

  <div class="login-wrapper">
    <div class="login-box">
      <div class="brand">
        <div class="brand-icon"><img src="{{ url_for('static', filename='omar_login_image.png') }}" alt="OMAR BRO HOST" style="width: 100%; height: 100%; object-fit: cover; border-radius: 24px;"></div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px;">
          <span style="font-size: 1.8rem; font-weight: 900; color: var(--primary);">OMAR</span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z" fill="#0088cc"/>
          </svg>
        </div>
        <div class="brand-name">OMAR BRO HOST</div>
        <div class="brand-tagline">لوحة تحكم احترافية للاستضافة</div>
      </div>
      <div class="card">
        <h2 class="form-heading">تسجيل الدخول</h2>

        <div class="field">
          <label for="username">اسم المستخدم</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" />
            <span class="input-icon">👤</span>
          </div>
        </div>

        <div class="field">
          <label for="password">كلمة المرور</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" />
            <span class="input-icon">🔒</span>
            <button class="toggle-pass" type="button" onclick="togglePassword()" id="toggleBtn" title="إظهار/إخفاء">👁️</button>
          </div>
        </div>

        <label class="remember-row">
          <input type="checkbox" id="rememberMe">
          <span class="custom-check"></span>
          <span class="remember-label">تذكرني لمدة 30 يوماً</span>
        </label>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">
          <span class="btn-text">🚀 دخول إلى النظام</span>
          <div class="btn-spinner"></div>
        </button>

        <div class="alert" id="alertMsg"></div>

        <div class="admin-hint" id="adminHint">
          <p>👑 تسجيل دخول المسؤول — صلاحيات كاملة</p>
        </div>

        <div class="divider"><span>OMAR 2026©</span></div>
        <div class="footer-info">مطور بواسطة <span>OMAR</span> · آمن ومشفر</div>
      </div>
    </div>
  </div>

  <script>
    /* ===== Canvas Background ===== */
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W; this.y = Math.random() * H;
        this.vx = (Math.random()-0.5)*0.4; this.vy = (Math.random()-0.5)*0.4;
        this.r = Math.random()*1.5+0.5; this.alpha = Math.random()*0.4+0.1;
        this.color = Math.random()>0.5 ? '#00d4ff' : '#0066ff';
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle = this.color; ctx.globalAlpha = this.alpha; ctx.fill(); ctx.globalAlpha = 1;
      }
    }

    function initParticles() { particles=[]; for(let i=0;i<120;i++) particles.push(new Particle()); }

    function drawConnections() {
      for(let i=0;i<particles.length;i++) {
        for(let j=i+1;j<particles.length;j++) {
          const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<100) {
            ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y);
            ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle='#00d4ff';
            ctx.globalAlpha=(1-d/100)*0.08; ctx.lineWidth=0.5; ctx.stroke(); ctx.globalAlpha=1;
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0,0,W,H);
      particles.forEach(p=>{p.update();p.draw()});
      drawConnections(); requestAnimationFrame(animate);
    }

    resize(); initParticles(); animate();
    window.addEventListener('resize', ()=>{resize();initParticles();});

    /* ===== Stars ===== */
    const starsLayer = document.getElementById('starsLayer');
    for(let i=0;i<80;i++) {
      const s = document.createElement('div'); s.className='star';
      s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
      s.style.setProperty('--dur',(2+Math.random()*4).toFixed(1)+'s');
      s.style.setProperty('--op',(0.3+Math.random()*0.7).toFixed(2));
      s.style.animationDelay = (Math.random()*5).toFixed(1)+'s';
      starsLayer.appendChild(s);
    }

    /* ===== Password Toggle ===== */
    function togglePassword() {
      const inp = document.getElementById('password');
      const btn = document.getElementById('toggleBtn');
      if(inp.type==='password') { inp.type='text'; btn.textContent='🙈'; }
      else { inp.type='password'; btn.textContent='👁️'; }
    }

    /* ===== Admin hint ===== */
    document.getElementById('username').addEventListener('input', function() {
      const hint = document.getElementById('adminHint');
      hint.style.display = this.value.toLowerCase()==='rlh55' ? 'block' : 'none';
    });

    /* ===== Login ===== */
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const remember = document.getElementById('rememberMe').checked;
      const btn = document.getElementById('loginBtn');

      if(!username||!password) { showAlert('يرجى ملء جميع الحقول','error'); shakeCard(); return; }

      btn.classList.add('loading'); btn.disabled=true; hideAlert();

      try {
        const res = await fetch('/api/login',{
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({username, password, remember_me: remember})
        });
        const data = await res.json();
        if(data.success) {
          showAlert('✅ '+data.message+' — جاري التوجيه...','success');
          setTimeout(()=>{ window.location.href = data.redirect||'/'; },1200);
        } else {
          showAlert('❌ '+data.message,'error'); shakeCard();
          btn.classList.remove('loading'); btn.disabled=false;
        }
      } catch(e) {
        showAlert('⚠️ خطأ في الاتصال بالخادم','error'); shakeCard();
        btn.classList.remove('loading'); btn.disabled=false;
      }
    }

    function showAlert(msg,type) {
      const el=document.getElementById('alertMsg');
      el.textContent=msg; el.className='alert '+type; el.style.display='block';
    }
    function hideAlert() { document.getElementById('alertMsg').style.display='none'; }
    function shakeCard() {
      const card=document.querySelector('.card');
      card.style.animation='shake 0.5s ease';
      setTimeout(()=>{card.style.animation='';},500);
    }

    /* ===== Check auth ===== */
    async function checkAuth() {
      try {
        const res = await fetch('/api/current_user');
        const data = await res.json();
        if(data.success) window.location.href='/';
      } catch(e) {}
    }

    document.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
    document.addEventListener('DOMContentLoaded', checkAuth);
  </script>
</body>
</html>
