<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMAR BRO HOST | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #00d4ff;
            --accent-light: #70eaff;
            --bg: #050810;
            --panel: rgba(13, 18, 33, 0.95);
            --panel-border: rgba(0, 212, 255, 0.15);
            --text: #e0e6ed;
            --muted: #8899aa;
            --success: #00ff88;
            --error: #ff4444;
            --gradient: linear-gradient(135deg, #00d4ff, #0066ff);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 102, 255, 0.05) 0%, transparent 40%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; margin-bottom: 30px;
            border-bottom: 1px solid var(--panel-border);
        }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logout-btn { padding: 8px 20px; background: rgba(255, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(255, 68, 68, 0.2); border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: 700; }

        /* Dashboard Grid */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card-title { font-size: 1.2rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* Metrics */
        .metrics-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .metric-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--panel-border); }
        .metric-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
        .metric-value { font-size: 1.4rem; font-weight: 800; color: var(--primary); }

        /* Upload Section */
        .upload-section { margin-top: 25px; }
        .upload-box {
            border: 2px dashed var(--panel-border); border-radius: 15px; padding: 40px;
            text-align: center; cursor: pointer; transition: 0.3s;
            background: rgba(0, 212, 255, 0.02);
        }
        .upload-box:hover { border-color: var(--primary); background: rgba(0, 212, 255, 0.05); }
        .upload-icon { font-size: 40px; margin-bottom: 10px; }

        /* Files Table */
        .files-table-container { margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { padding: 15px; color: var(--muted); font-size: 0.9rem; border-bottom: 1px solid var(--panel-border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .file-name { color: var(--primary); font-weight: 700; cursor: pointer; }
        .btn-action { padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 700; margin-right: 5px; }
        .btn-view { background: rgba(0, 212, 255, 0.1); color: var(--primary); }
        .btn-delete { background: rgba(255, 68, 68, 0.1); color: var(--error); }

        /* Chat Widget */
        .chat-widget { position: fixed; bottom: 30px; left: 30px; z-index: 1000; }
        .chat-btn { width: 60px; height: 60px; background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 25px rgba(0,136,255,0.4); }
        .chat-window {
            position: absolute; bottom: 80px; left: 0; width: 350px; height: 450px;
            background: var(--panel); border: 1px solid var(--panel-border); border-radius: 20px;
            display: none; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .chat-header { padding: 15px; background: var(--gradient); color: #000; font-weight: 800; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 0.9rem; }
        .msg.user { align-self: flex-end; background: var(--primary); color: #000; }
        .msg.admin { align-self: flex-start; background: rgba(255,255,255,0.1); color: #fff; }
        .chat-input { padding: 15px; border-top: 1px solid var(--panel-border); display: flex; gap: 10px; }
        .chat-input input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); padding: 10px; border-radius: 10px; color: #fff; outline: none; }

        /* File Viewer Modal */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .modal-content {
            width: 100%; max-width: 900px; height: 80vh; background: #0a0d14;
            border-radius: 20px; border: 1px solid var(--panel-border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--panel-border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { flex: 1; padding: 20px; overflow: auto; }
        pre { font-family: 'Courier New', monospace; color: #9ab5c7; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span>OMAR BRO HOST</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z"/></svg>
            </div>
            <div class="user-info">
                <span id="userNameDisplay">جاري التحميل...</span>
                <a href="/api/logout" class="logout-btn">خروج</a>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Main Content -->
            <div class="main-col">
                <div class="card">
                    <div class="card-title">📂 إدارة الملفات والرفع</div>
                    
                    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-icon">☁️</div>
                        <div class="upload-text">اضغط هنا لرفع ملفاتك (PY, HTML, TXT, JSON)</div>
                        <input type="file" id="fileInput" style="display: none" multiple onchange="handleUpload(this.files)">
                    </div>

                    <div class="files-table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>اسم الملف</th>
                                    <th>الحجم</th>
                                    <th>التاريخ</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="filesList">
                                <!-- Files will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="side-col">
                <div class="card">
                    <div class="card-title">📊 استهلاك الموارد</div>
                    <div class="metrics-container">
                        <div class="metric-card">
                            <div class="metric-label">المعالج CPU</div>
                            <div class="metric-value" id="cpuVal">0%</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">الذاكرة RAM</div>
                            <div class="metric-value" id="ramVal">0%</div>
                        </div>
                    </div>
                    <canvas id="resourceChart" height="150"></canvas>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-title">🛡️ حالة السيرفر</div>
                    <div style="display: flex; align-items: center; gap: 10px; color: var(--success);">
                        <span style="width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block;"></span>
                        <span>يعمل بكفاءة عالية 24/7</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Widget -->
    <div class="chat-widget">
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span>الدعم الفني المباشر 💬</span>
                <span style="cursor: pointer" onclick="toggleChat()">✖</span>
            </div>
            <div class="chat-messages" id="chatMsgs"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="اكتب رسالتك هنا...">
                <button class="btn-action btn-view" onclick="sendMsg()">إرسال</button>
            </div>
        </div>
        <div class="chat-btn" onclick="toggleChat()">💬</div>
    </div>

    <!-- File Viewer Modal -->
    <div class="modal" id="fileModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalFileName" style="color: var(--primary)">اسم الملف</h3>
                <button class="btn-action btn-delete" onclick="closeModal()">إغلاق</button>
            </div>
            <div class="modal-body">
                <pre id="fileContent">جاري تحميل المحتوى...</pre>
            </div>
        </div>
    </div>

    <script>
        // Toggle Chat
        function toggleChat() {
            const win = document.getElementById('chatWindow');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
            if(win.style.display === 'flex') loadMsgs();
        }

        // Load Files
        async function loadFiles() {
            const res = await fetch('/api/files/list');
            const data = await res.json();
            const tbody = document.getElementById('filesList');
            tbody.innerHTML = data.files.map(f => `
                <tr>
                    <td class="file-name" onclick="viewFile('${f.name}')">${f.name}</td>
                    <td>${f.size}</td>
                    <td>${f.time}</td>
                    <td>
                        <button class="btn-action btn-view" onclick="viewFile('${f.name}')">قراءة</button>
                        <button class="btn-action btn-delete" onclick="deleteFile('${f.name}')">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        // View File
        async function viewFile(name) {
            document.getElementById('modalFileName').textContent = name;
            document.getElementById('fileContent').textContent = 'جاري التحميل...';
            document.getElementById('fileModal').style.display = 'flex';
            
            const res = await fetch('/api/files/read', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filename: name})
            });
            const data = await res.json();
            document.getElementById('fileContent').textContent = data.content || data.error;
        }

        function closeModal() { document.getElementById('fileModal').style.display = 'none'; }

        // Metrics Update
        async function updateMetrics() {
            const res = await fetch('/api/system/metrics');
            const data = await res.json();
            document.getElementById('cpuVal').textContent = data.cpu + '%';
            document.getElementById('ramVal').textContent = data.memory + '%';
        }

        setInterval(updateMetrics, 5000);
        updateMetrics();
        loadFiles();
        
        // Get User Info
        fetch('/api/user/info').then(r => r.json()).then(data => {
            document.getElementById('userNameDisplay').textContent = 'مرحباً، ' + data.username;
        });
    </script>
</body>
</html>
